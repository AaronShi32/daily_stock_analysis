# ===================================
# A股自选股智能分析系统 - Docker Compose
# ===================================
#
# 使用方式:
#   全部启动: docker-compose -f ./docker/docker-compose.yml up -d
#   仅 Web:  docker-compose -f ./docker/docker-compose.yml up -d server
#   仅分析:  docker-compose -f ./docker/docker-compose.yml up -d analyzer-pre analyzer-post

name: daily-stock-analysis

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # 环境变量（从 .env 文件加载）
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../.env:/app/.env
    - ../strategies:/app/strategies:ro

  environment:
    - TZ=Asia/Shanghai
    - WEBUI_HOST=0.0.0.0
    # 容器间通过 service name 访问 SearXNG
    - SEARXNG_BASE_URLS=http://searxng:8080
    - SEARXNG_PUBLIC_INSTANCES_ENABLED=false

  depends_on:
    searxng:
      condition: service_healthy

  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # SearXNG 搜索引擎
  searxng:
    image: searxng/searxng:latest
    container_name: dsa-searxng
    restart: unless-stopped
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    ports:
      - "8888:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # 美股盘前分析（北京时间 21:00，周一至周五）
  analyzer-pre:
    <<: *common
    container_name: stock-analyzer-pre
    environment:
      - TZ=Asia/Shanghai
      - WEBUI_HOST=0.0.0.0
      - SEARXNG_BASE_URLS=http://searxng:8080
      - SEARXNG_PUBLIC_INSTANCES_ENABLED=false
      - SCHEDULE_ENABLED=true
      - SCHEDULE_TIME=21:00
      - SCHEDULE_RUN_IMMEDIATELY=false
      - MARKET_REVIEW_REGION=us

  # 美股盘后分析（北京时间 05:00，周二至周六）
  analyzer-post:
    <<: *common
    container_name: stock-analyzer-post
    environment:
      - TZ=Asia/Shanghai
      - WEBUI_HOST=0.0.0.0
      - SEARXNG_BASE_URLS=http://searxng:8080
      - SEARXNG_PUBLIC_INSTANCES_ENABLED=false
      - SCHEDULE_ENABLED=true
      - SCHEDULE_TIME=05:00
      - SCHEDULE_RUN_IMMEDIATELY=false
      - MARKET_REVIEW_REGION=us

  # Web 服务 + 飞书 Stream Bot
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
